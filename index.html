<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Randomantic</title>
    <link rel="icon" href="">
    <link rel="stylesheet" href="style/index.css">
  </head>
  <body>
    <div id="menu">
      <h1 id="title">Randomantic</h1>
      <nav>
        <p><span class="menu-button" id="start">Start</span></p>
        <p><span class="menu-button" id="options">Options</span></p>
        <p><span class="menu-button" id="credits">Credits</span></p>
      </nav>
    </div>
    <script>
      var allButtons = document.getElementsByClassName("menu-button");
      
      var onButtonClick = function() {
        var buttonAudio = document.createElement("audio");
        buttonAudio.src = "style/audio/buttonSFX.mp3";
        buttonAudio.autoplay = "true";
      }

      for(var i = 0; i < allButtons.length; i++) {
        allButtons[i].addEventListener("click", onButtonClick);
      }
    </script>
  </body>
</html>
