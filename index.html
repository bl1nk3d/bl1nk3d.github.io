<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Randomantic</title>
    <link rel="icon" href="style/images/logo.svg">
    <link rel="stylesheet" href="style/index.css">
  </head>
  <body>
    <div id="menu">
      <h1 id="title">Randomantic</h1>
      <nav>
        <p><span class="menu-button" id="start">Start</span></p>
        <p><span class="menu-button" id="options">Options</span></p>
        <p><span class="menu-button" id="credits">Credits</span></p>
      </nav>
    </div>
    <div class="scene" id="classroom"></div>
    <div class="scene" id="school"></div>
    <div class="scene" id="train"></div>
    <div class="scene" id="walking"></div>
    <div class="scene" id="bedroom"></div>
    <div class="scene" id="asleep"></div>
    <div class="scene" id="alarm"></div>

    <img id="loading">
    
    <div id="acquired-item">
      <div id="item-content">
        <h1>You have received an item!</h1>
        <img src="style/images/logo.svg" id="item-image">
        <h2 id="item-name">A letter from Xavier!</h2>
        <h4 id="item-desc">I wonder what's inside it...</h4>
      </div>

      <h5 id="item-hint">[ Press anywhere to continue... ]</h5>
    </div>

    <div id="game-ui">
      <img src="style/images/tokyoToni.svg" id="character-model">
      <div id="text-box">
          <h1 id="character-name">Narrator</h1>
          <h2 id="dialogue">Lorem ipsum</h2>
          <h3 id="text-hint">[ Press to continue... ]</h3>
          <div id="choices">
            <div class="choice one"><span class="choice-text">Option 1</span></div>
            <div class="choice two"><span class="choice-text">Option 2</span></div>
          </div>
      </div>
    </div>

    <script>
      var preloadImages = async function(paths) {
        await Promise.all(paths.map(src => {
          return new Promise(resolve => {
            const img = new Image();
            img.src = src;
            img.onload = resolve;
          });
        }));
      }

      window.onload = async () => {
        startButton.style.pointerEvents = "none";
        startButton.style.opacity = "0.5";

        await preloadImages([
          "style/images/menu.svg",
          "style/images/space.svg",
          "style/images/bedroom.svg",
          "style/images/train.svg",
          "style/images/school.svg",
          "style/images/classroom.svg",
          "style/images/textbox.svg",
          "style/images/button.svg",
          "style/images/peony.svg",
          "style/images/matcha.svg",
          "style/images/coke.svg",
          "style/images/duck.svg",
          "style/images/kweenLL.svg",
          "style/images/tokyoToni.svg",
          "style/images/conductor.svg",
          "style/images/silhouette.svg",
          "style/images/xavier.svg",
          "style/images/tokyoAthena.svg",
          "style/images/alexandra.svg"
        ]);

        startButton.style.pointerEvents = "auto";
        startButton.style.opacity = "1";
      };

      // ===== ELEMENTS =====
      var screen = document.body;
      var menu = document.getElementById("menu");
      var alarmSceneEl = document.getElementById("alarm");
      var bedroomSceneEl = document.getElementById("bedroom");
      var asleepSceneEl = document.getElementById("asleep");
      var trainSceneEl = document.getElementById("train");
      var walkingSceneEl = document.getElementById("walking");
      var schoolSceneEl = document.getElementById("school");
      var classroomSceneEl = document.getElementById("classroom");

      var buttons = document.getElementsByClassName("menu-button");
      var choices = document.getElementById("choices");
      var choiceButtons = document.getElementsByClassName("choice");
      var startButton = document.getElementById("start");
      var optionsButton = document.getElementById("options");
      var creditsButton = document.getElementById("credits");

      var gameUI = document.getElementById("game-ui");
      var charName = document.getElementById("character-name");
      var charModel = document.getElementById("character-model");
      var dialogue = document.getElementById("dialogue");
      var acquiredItem = document.getElementById("acquired-item");
      var itemImage = document.getElementById("item-image");
      var itemName = document.getElementById("item-name");
      var itemDesc = document.getElementById("item-desc");
      var loadingMsg = document.getElementById("loading");

      // ===== AUDIO =====
      var hoverAudio = new Audio("style/audio/hoverSFX.MP3");
        hoverAudio.volume = 0.5;
      var buttonAudio = new Audio("style/audio/buttonSFX.MP3");
        buttonAudio.volume = 0.5;
      var clockAudio = new Audio("style/audio/alarmClockSFX.MP3");
        clockAudio.volume = 0.5;
      var spaceMusic = new Audio("style/audio/spaceMusic.MP3");
        spaceMusic.volume = 0.5;
        spaceMusic.loop = true;
      var phoneVibrate = new Audio("style/audio/phoneVibrate.MP3");
        phoneVibrate.volume = 0.5;
      var shineSFX = new Audio("style/audio/shineSFX.MP3");
        shineSFX.volume = 0.5;
      var walkingSFX = new Audio("style/audio/footstepsSFX.MP3");
        walkingSFX.volume = 0.3;
      var trainCloseSFX = new Audio("style/audio/trainCloseSFX.MP3");
        trainCloseSFX.volume = 0.5;
      var music1 = new Audio("style/audio/mainGameMusic.MP3");
        music1.volume = 0.5;
        music1.loop = true;
      var trainMusic = new Audio("style/audio/trainMusic.MP3");
        trainMusic.volume = 0.5;
        trainMusic.loop = true;
      var music2 = new Audio("style/audio/schoolMusic.MP3");
        music2.volume = 0.5;
        music2.loop = true;
      var music3 = new Audio("style/audio/classroomMusic.MP3");
        music3.volume = 0.5;
        music3.loop = true;
      var music4 = new Audio("style/audio/music4.MP3");
        music4.volume = 0.5;
        music4.loop = true;

      // ===== SOUND FUNCTIONS =====
      var onButtonHover = function() {
        hoverAudio.volume = 0.3;
        hoverAudio.currentTime = 0;
        hoverAudio.play();
      }

      var onButtonClick = function() {
        buttonAudio.currentTime = 0;
        buttonAudio.play();
      }

      var addSoundEvents = function (elements) {
        for (var i = 0; i < elements.length; i++) {
          elements[i].addEventListener("mouseenter", onButtonHover);
          elements[i].addEventListener("click", onButtonClick);
        }
      }

      addSoundEvents(buttons);
      addSoundEvents(choiceButtons);

      // ==== DIALOGUE STUFF ====

      async function typeText(element, text) {
        element.textContent = "";
        for (let i = 0; i < text.length; i++) {
          element.textContent += text[i];
          await new Promise(resolve => setTimeout(resolve, 65));
        }
      }

      var showChoices = function () {
        var choicesVisible = true;
        for (var i = 0; i < choiceButtons.length; i++) {
          choiceButtons[i].style.display = "block";
        }
      };

      var hideChoices = function () {
        var choicesVisible = false;
        for (var i = 0; i < choiceButtons.length; i++) {
          choiceButtons[i].style.display = "none";
        }
      };

      // ===== SCENE CHANGE =====
      function showScene(currentScene, nextScene) {
        currentScene.style.display = "none";
        nextScene.style.display = "block";
      }

      function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      // ===== SCENES =====

      var menuScreen = function(currentSceneEl) {
        spaceMusic.pause();
        spaceMusic.currentTime = 0;
        currentSceneEl.style.display = "none";
        menu.style.opacity = "1";
        menu.style.display = "block";
        gameUI.style.display = "none";
        hideChoices();
      }

      var onStartClick = async function(currentSceneEl) {
        spaceMusic.pause();
        spaceMusic.currentTime = 0;
        menu.style.opacity = "0";
        alarmSceneEl.style.opacity = "1";
        currentSceneEl.style.display = "none";
        gameUI.style.display = "none";
        hideChoices();

        await delay(300);
        showScene(menu, alarmSceneEl);

        await delay(1500);
        clockAudio.play();

        gameUI.style.display = "flex";
        hideChoices();
        charName.textContent = "Alarm";
        await typeText(dialogue, "*ring* *ring* *ring*...");

        await delay(2000);
        showChoices();
        choiceButtons[0].querySelector(".choice-text").textContent = "*Wake up*";
        choiceButtons[1].querySelector(".choice-text").textContent = "*Stay in bed*";

        choiceButtons[0].onclick = wakeUpScene;
        choiceButtons[1].onclick = () => stayAsleepScene(alarmSceneEl);
      }

      startButton.addEventListener("click", () => onStartClick(alarmSceneEl));

      var stayAsleepScene = async function(currentSceneEl) {
        hideChoices();
        gameUI.style.display = "none";
        currentSceneEl.style.opacity = "0";
        asleepSceneEl.style.display = "block";

        spaceMusic.play();
        spaceMusic.currentTime = 0;
        clockAudio.pause();
        clockAudio.currentTime = 0;
        music1.pause();
        music1.currentTime = 0;

        await delay(2000);
        showScene(currentSceneEl, asleepSceneEl);
        gameUI.style.display = "flex";
        charName.textContent = "Game";
        await typeText(dialogue, "As you fall into a deep sleep, you wake up floating in space.");

        await delay(2000);
        await typeText(dialogue, "When you try to wake yourself up, you realize that you can't.");

        await delay(2000);
        await typeText(dialogue, "Do you wish to restart?");
        showChoices();

        choiceButtons[0].querySelector(".choice-text").textContent = "Yes.";
        choiceButtons[1].querySelector(".choice-text").textContent = "Title screen.";

        choiceButtons[0].onclick = () => onStartClick(asleepSceneEl);
        choiceButtons[1].onclick = () => menuScreen(asleepSceneEl);
      }

      var wakeUpScene = async function () {
        hideChoices();

        clockAudio.pause();
        clockAudio.currentTime = 0;

        gameUI.style.display = "none";
        alarmSceneEl.style.opacity = "0";
        bedroomSceneEl.style.opacity = "1";
        bedroomSceneEl.style.display = "block";

        await delay(1600);
        music1.play();
        showScene(alarmSceneEl, bedroomSceneEl);

        await delay(300);
        gameUI.style.display = "flex";
        charName.textContent = "You";
        await typeText(dialogue, "...");

        await delay(2000);
        phoneVibrate.play();
        charModel.src = "style/images/kweenLL.svg";
        charModel.style.opacity = "1";
        charName.textContent = "Miro";
        await typeText(dialogue, "Girl, you're gonna be late for school if you don't wake up now.");
      
        await delay(2000);
        charModel.style.opacity = "0";
        charName.textContent = "Phone";
        await typeText(dialogue, "Date: June 30, 2026 | Time: 6:43am");

        await delay(2000);
        charName.textContent = "You";
        await typeText(dialogue, "OMG... I WOKE UP SO LATE!");

        await delay(2000);
        charName.textContent = "Game";
        await typeText(dialogue, "*You brushed your teeth, took a shower, changed your clothes, ate food, and packed up.*");

        await delay(2000);
        shineSFX.play();
        charModel.src = "style/images/tokyoToni.svg";
        charModel.style.opacity = "1";
        charName.textContent = "You";
        await typeText(dialogue, "There, I'm all ready!");

        await delay(2000);
        charModel.style.opacity = "0";
        charName.textContent = "Game";
        await typeText(dialogue, "Do you want to go to the train station?");
        showChoices();
        choiceButtons[0].querySelector(".choice-text").textContent = "Yes.";
        choiceButtons[1].querySelector(".choice-text").textContent = "*Go back to sleep.*";

        choiceButtons[0].onclick = () => walkingScene(bedroomSceneEl, () => trainScene(schoolScene));
        choiceButtons[1].onclick = () => stayAsleepScene(bedroomSceneEl);
      }

      var walkingScene = async function(currentSceneEl, nextScene) {
        music1.pause();
        music1.currentTime = 0;
        music2.pause();
        music2.currentTime = 0;
        music3.pause();
        music3.currentTime = 0;
        walkingSceneEl.style.opacity = "1";
        showScene(currentSceneEl, walkingSceneEl);
        gameUI.style.display = "none";
        hideChoices();

        var images = [
          "style/images/peony.svg",
          "style/images/matcha.svg",
          "style/images/coke.svg",
          "style/images/duck.svg"
        ];

        var rand = Math.floor(Math.random() * images.length);
        loadingMsg.src = images[rand];

        loadingMsg.style.display = "block";

        await delay(1000);
        walkingSFX.play();

        await delay(5000);
        loadingMsg.style.display = "none";
        nextScene();
      }

      var trainScene = async function(nextScene) {
        trainCloseSFX.play();
        trainSceneEl.style.display = "block";

        await delay(5000);
        walkingSceneEl.style.opacity = "0";
        
        await delay(1600);
        showScene(walkingSceneEl, trainSceneEl);

        await delay(1000);
        trainMusic.play();

        await delay(1000);
        gameUI.style.display = "flex";
        charModel.src = "style/images/conductor.svg";
        charModel.style.opacity = "1";
        charName.textContent = "Train Conductor";
        await typeText(dialogue, "May I remind everyone to please take care of your belongings.");

        await delay(2000);
        gameUI.style.display = "none";
        charModel.style.opacity = "0";

        await delay(8000);
        gameUI.style.display = "flex";
        charModel.style.opacity = "1";
        await typeText(dialogue, "We are now arriving at the next station. Please make way for those who are exiting the train.");

        await delay(2000);
        gameUI.style.display = "none";
        charModel.style.opacity = "0";

        await delay(4000);
        trainMusic.pause();
        trainMusic.currentTime = 0;
        
        walkingScene(trainSceneEl, nextScene);
      }

      var schoolScene = async function() {
        walkingSceneEl.style.opacity = "0";
        schoolSceneEl.style.display = "block";

        await delay(1600);
        music2.play();
        music2.currentTime = 0;
        showScene(walkingSceneEl, schoolSceneEl);

        await delay(2000);
        gameUI.style.display = "flex";
        charModel.src = "style/images/tokyoToni.svg";
        charModel.style.opacity = "1";
        charName.textContent = "You";
        await typeText(dialogue, "EXCUSE ME... SORRY, MAKE WAY PLEASE.");

        await delay(2000);
        charModel.style.opacity = "0";
        charName.textContent = "Game";
        await typeText(dialogue, "*You bump into someone.*");

        await delay(2000);
        charModel.src = "style/images/silhouette.svg";
        charModel.style.opacity = "1";
        charName.textContent = "???";
        await typeText(dialogue, "Watch where you're going next time.");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "Ugh... all my things are scattered now.");
        
        await delay(2000);
        charModel.style.opacity = "0";
        charName.textContent = "Game";
        await typeText(dialogue, "*You scatter trying to pick all your things up when a familiar silhouette approaches and helps you.*");

        await delay(2000);
        charModel.style.opacity = "1";
        charModel.src = "style/images/xavier.svg";
        charName.textContent = "Xavier";
        await typeText(dialogue, "Here, let me help you. You're the student council president right? I'm Xavier.");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "Oh, thank you. And yes, I'm the student council president. You're the volleyball captain, right?");

        await delay(2000);
        charModel.style.opacity = "1";
        charModel.src = "style/images/xavier.svg";
        charName.textContent = "Xavier";
        await typeText(dialogue, "Yea haha, you go on ahead, I have to get something from my locker. See you later?");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "Mhm. See you Xavier!");

        await delay(2000);
        charModel.style.opacity = "0";
        charName.textContent = "Game";
        await typeText(dialogue, "*The two of you seperate, and you take your phone out to text your friends.*");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charModel.style.opacity = "1";
        charName.textContent = "You";
        await typeText(dialogue, "YALL... THE GUY WHO HELPED ME WAS SO FINE, GUESS WHO IT WAS!");

        await delay(2000);
        phoneVibrate.play();
        charModel.src = "style/images/tokyoAthena.svg";
        charName.textContent = "Jansen";
        await typeText(dialogue, "GIRL, IT'S ALREADY 7:30AM, MADAM ALEXANDRA IS COMING HERE, WHERE ARE YOU?");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "WAIT, I'M HEADING THERE. BUT LIKE, THE GUY WAS SO FINE. GUESS WHO.");

        await delay(2000);
        phoneVibrate.play();
        charModel.src = "style/images/kweenLL.svg";
        charName.textContent = "Miro";
        await typeText(dialogue, "Just say who it was already.");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "It was the volleyball captain... :sob:");

        await delay(2000);
        phoneVibrate.play();
        charModel.src = "style/images/kweenLL.svg";
        charName.textContent = "Miro";
        await typeText(dialogue, "I thought you said you already lost feelings for him.");

        await delay(2000);
        phoneVibrate.play();
        charModel.src = "style/images/tokyoAthena.svg";
        charName.textContent = "Jansen";
        await typeText(dialogue, "Same-");

        await delay(2000);
        phoneVibrate.play();
        charModel.src = "style/images/kweenLL.svg";
        charName.textContent = "Miro";
        await typeText(dialogue, "Girl, Mrs. Alexandra is coming here soon, let's just talk later when you're here.");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "Okay.");

        await delay(2000);
        walkingScene(schoolSceneEl, classroomScene);
      }

      var classroomScene = async function() {
        walkingSceneEl.style.opacity = 0;
        classroomSceneEl.style.display = "block";
        
        await delay(1600);
        music3.play();
        music3.currentTime = 0;
        showScene(walkingSceneEl, classroomSceneEl);

        await delay(2000);
        gameUI.style.display = "flex";
        charModel.src = "style/images/tokyoAthena.svg";
        charModel.style.opacity = "1";
        charName.textContent = "Jansen";
        await typeText(dialogue, "CHILE, YOU WERE SO CLOSE TO BEING LATE.");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "OMG HE WAS SO FINE THOUGH...");

        await delay(2000);
        charModel.src = "style/images/kweenLL.svg";
        charName.textContent = "Miro";
        await typeText(dialogue, "You're so OA.");
        
        await delay(2000);
        charModel.src = "style/images/alexandra.svg";
        charName.textContent = "Mrs. Alexandra";
        await typeText(dialogue, "Do you want me to seperate you, girls in the back? HA?");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "We're sorry ma'am.");

        await delay(2000);
        charModel.style.opacity = "0";
        charName.textContent = "Game";
        await typeText(dialogue, "*A few minutes pass by...*");

        await delay(2000);
        await typeText(dialogue, "*Xavier enters the classroom and gets scolded by Mrs. Alexandra.*");

        await delay(2000);
        charModel.src = "style/images/alexandra.svg";
        charModel.style.opacity = "1";
        charName.textContent = "Mrs. Alexandra";
        await typeText(dialogue, "Xavier? You're ten minutes late to my class. Why is this?");

        await delay(2000);
        charModel.src = "style/images/xavier.svg";
        charName.textContent = "Xavier";
        await typeText(dialogue, "Sorry ma'am. Something came up, I'll arrive earlier tomorrow.");

        await delay(2000);
        charModel.src = "style/images/silhouette.svg";
        charName.textContent = "Everyone";
        await typeText(dialogue, "Oooh...");

        await delay(2000);
        charModel.src = "style/images/alexandra.svg";
        charName.textContent = "Mrs. Alexandra";
        await typeText(dialogue, "Settle down everyone. Open your books to page 148.");

        await delay(2000);
        await typeText(dialogue, "Okay now that's done... You can pick any seat you'd like Xavier.");

        await delay(2000);
        charModel.style.opacity = "0";
        charName.textContent = "Game";
        await typeText(dialogue, "*Xavier comes closer to you and eventually sits down on the vacant seat beside you.*");

        await delay(2000);
        charModel.src = "style/images/xavier.svg";
        charModel.style.opacity = "1";
        charName.textContent = "Xavier";
        await typeText(dialogue, "Hey. I forgot to ask you earlier, but, what's your name?");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "Oh! You can call me Noah.");

        await delay(2000);
        charModel.src = "style/images/xavier.svg";
        charName.textContent = "Xavier";
        await typeText(dialogue, "That's a pretty name! So... what did I miss in class?");

        await delay(2000);
        charModel.src = "style/images/tokyoToni.svg";
        charName.textContent = "You";
        await typeText(dialogue, "Nothing much, ma'am only did attendance.");

        await delay(2000);
        charModel.src = "style/images/xavier.svg";
        charName.textContent = "Xavier";
        await typeText(dialogue, "Ah okay.");

        await delay(2000);
        charModel.style.opacity = "0";
        charName.textContent = "Game";
        await typeText(dialogue, "The class went on for another hour and a half. Luckily, that was your only class for the day.");

        await delay(2000);
        await typeText(dialogue, "Do you want to go to the train station?");
        showChoices();
        choiceButtons[0].querySelector(".choice-text").textContent = "Absolutely.";
        choiceButtons[1].querySelector(".choice-text").textContent = "Yes.";

        choiceButtons[0].onclick = () => walkingScene(classroomSceneEl, () => trainScene(bedroomScene2));
        choiceButtons[1].onclick = () => walkingScene(classroomSceneEl, () => trainScene(bedroomScene2));
      }

      var bedroomScene2 = async function() {
        bedroomSceneEl.style.display = "block";
        walkingSceneEl.style.opacity = 0;

        await delay(1600);
        music4.play();
        showScene(walkingSceneEl, bedroomSceneEl);

        await delay(2000);
        gameUI.style.display = "flex";
        charName.textContent = "Game";
        await typeText(dialogue, "You rummage through your things and get ready to pack for the next day, when you come across... a letter?");

        await delay(2000);
        gameUI.style.display = "none";
        shineSFX.play();
        acquiredItem.style.display = "flex";
        acquiredItem.onclick = async function() {
          acquiredItem.style.display = "none";

          await delay(2000);
          gameUI.style.display = "flex";
          await typeText(dialogue, "You open the letter and read its contents.");

          await delay(2000);
          charModel.src = "style/images/xavier.svg";
          charModel.style.opacity = "1";
          charName.textContent = "Xavier (Letter)";
          await typeText(dialogue, "I was hoping that you stayed after class for a little longer.");

          await delay(2000);
          await typeText(dialogue, "I was gonna ask you if you wanted to go out sometime for coffee... haha.");

          await delay(2000);
          await typeText(dialogue, "Anyways, here's my number if you're up for coffee or anything else.");

          await delay(2000);
          charModel.src = "style/images/tokyoToni.svg";
          charName.textContent = "You";
          await typeText(dialogue, "0983 - 257 - 8124...");

          await delay(2000);
          charModel.style.opacity = "0";
          charName.textContent = "Game";
          await typeText(dialogue, "This is the end of the demo. Thanks for playing! :D");
        }
      }

    </script>
  </body>
</html>
